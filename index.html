<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>VU Meter Broadcast</title><script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0f15;font-family:Segoe UI,sans-serif;color:#e6edf3;padding:20px}
h2{text-align:center;color:#ffaa00;text-shadow:0 0 20px #ffaa00;margin:0 0 30px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:25px;max-width:1600px;margin:0 auto}
.card{background:#111c26;border-radius:18px;padding:18px;box-shadow:0 10px 30px #000c;border:1px solid #2a3a4a}
video,audio{width:100%;border-radius:10px;background:#000;margin-top:10px}
canvas{width:100%;height:230px;margin-top:10px;background:#0a141f;border-radius:12px;padding:5px}
.peak-led{width:16px;height:16px;border-radius:50%;background:#330000;margin:8px auto;transition:.1s}
.peak-led.on{background:red;box-shadow:0 0 20px red}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:15px}
.box{background:#162430;padding:8px;border-radius:8px;font-size:11px;border-left:3px solid #ffaa00}
.box span{color:#8a9bb0;display:block;margin-bottom:4px}
.box strong{display:block;font-size:13px;color:#fff}
.dbfs-display{background:#0a141f;border:2px solid #2a3a4a;border-radius:8px;padding:10px;margin:10px 0;text-align:center;box-shadow:inset 0 2px 5px #0008}
.dbfs-value{font-size:32px;font-weight:700;font-family:'Courier New',monospace;color:#ffaa00;text-shadow:0 0 15px #ffaa00}
.dbfs-label{font-size:12px;color:#8a9bb0;margin-left:5px}
.dbfs-scale{display:flex;justify-content:space-between;font-size:10px;color:#5a6b80;margin-top:5px;padding:0 5px}
.stream-header{display:flex;align-items:center;gap:12px;margin-bottom:15px;background:#0a141f;padding:12px;border-radius:12px}
.stream-icon{width:40px;height:40px;border-radius:8px;background:#1e2a36;display:flex;align-items:center;justify-content:center;font-size:20px}
.stream-title{flex:1}
.stream-title h3{margin:0;font-size:16px;display:flex;align-items:center;gap:8px}
.stream-title small{color:#ffaa00;font-size:10px;display:block;margin-top:4px}
.stream-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:9px;font-weight:700}
.badge-tv{background:#4a6a8a;color:#fff}
.badge-radio{background:#8a6a4a;color:#fff}
.status-indicator{width:10px;height:10px;border-radius:50%;background:#4caf50;animation:pulse 2s infinite}
.status-indicator.paused{background:#ffaa00}
.status-indicator.error{background:#f44336}
@keyframes pulse{0%{opacity:1}50%{opacity:.5}100%{opacity:1}}
.control-bar{display:flex;gap:10px;margin:10px 0;justify-content:center}
.control-btn{background:#1e2a36;border:1px solid #3a4a5a;color:#fff;padding:5px 15px;border-radius:20px;font-size:12px;cursor:pointer}
.control-btn:hover{background:#2a3a4a;border-color:#ffaa00}
.footer{margin-top:40px;padding:20px;text-align:center;border-top:1px solid #2a3a4a;color:#5a6b80;font-size:12px}
.footer a{color:#ffaa00;text-decoration:none;margin:0 10px}
.footer a:hover{text-decoration:underline}
</style></head>
<body>
<h2>🎵 Painel Broadcast - VU Meter LED</h2>
<div class="grid" id="grid"></div>
<div class="footer"><p>Painel Broadcast - VU Meter LED | Streams ao vivo</p><p><a href="#" onclick="return false;">Termos de Uso</a> | <a href="#" onclick="return false;">Privacidade</a> | <span>v2.0.0</span></p></div>
<script>
const streams=[
{name:"TV O Povo",url:"https://v-us-01.wisestream.io/memfs/e8740862-7a1f-45f3-acb2-4f357e144059.m3u8",type:"tv",icon:"📺"},
{name:"TV FDR",url:"https://v-us-01.wisestream.io/memfs/e4ade538-7924-4359-81ef-b9d4dd229e91.m3u8",type:"tv",icon:"📡"},
{name:"CBN Cariri",url:"https://ice-br.fabricahost.com.br/play/cbncariri",type:"radio",icon:"🔊"},
{name:"CBN Fortaleza",url:"https://ice-br.fabricahost.com.br/play/cbnfortaleza",type:"radio",icon:"🎙️"},
{name:"Nova Brasil",url:"https://playerservices.streamtheworld.com/api/livestream-redirect/NOVABRASIL_FORAAC.aac",type:"radio",icon:"🎵"},
{name:"Rádio Maria FM",url:"https://dreamsiteradiocp6.com/proxy/rmbrasile?mp=/stream",type:"radio",icon:"🙏"}
];
let audioCtx=null;
function initAudioContext(){if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();}return audioCtx;}
streams.forEach(createCard);
function createCard(s){
 const c=document.createElement("div");c.className="card";
 const badgeClass=s.type=="tv"?"badge-tv":"badge-radio",badgeText=s.type=="tv"?"📺 TV":"📻 RÁDIO";
 c.innerHTML=`
 <div class="stream-header"><div class="stream-icon">${s.icon}</div><div class="stream-title"><h3>${s.name} <span class="stream-badge ${badgeClass}">${badgeText}</span></h3><small>${s.url.split('/')[2]}</small></div><div class="status-indicator paused" id="status-${s.name.replace(/\s/g,'')}"></div></div>
 ${s.type=="tv"?"<video controls crossorigin='anonymous' preload='none'></video>":"<audio controls crossorigin='anonymous' preload='none'></audio>"}
 <div class="control-bar"><button class="control-btn" onclick="initAudioContext()">🔊 Iniciar Áudio</button></div>
 <div class="dbfs-display"><span class="dbfs-value" id="dbfs-${s.name.replace(/\s/g,'')}">-60.0</span><span class="dbfs-label">dBFS</span><div class="dbfs-scale"><span>-60</span><span>-40</span><span>-20</span><span>0</span></div></div>
 <canvas></canvas><div class="peak-led"></div><div class="info-grid"></div>`;
 const m=c.querySelector("video")||c.querySelector("audio");
 const cv=c.querySelector("canvas"),ctx=cv.getContext("2d");
 const pl=c.querySelector(".peak-led"),ig=c.querySelector(".info-grid");
 const dbfs=document.getElementById(`dbfs-${s.name.replace(/\s/g,'')}`);
 const sts=document.getElementById(`status-${s.name.replace(/\s/g,'')}`);
 cv.width=360;cv.height=230;
 let codec="-",bitrate="-",fmt="-",cont=s.url.endsWith(".m3u8")?"HLS":"Direto";
 let src=null,an=null,anL=null,anR=null,audioOk=false;
 if(s.url.endsWith(".m3u8")){
  if(Hls.isSupported()){
   const hls=new Hls({enableWorker:true,lowLatencyMode:true,backBufferLength:90});
   hls.loadSource(s.url);hls.attachMedia(m);
   hls.on(Hls.Events.MANIFEST_PARSED,(e,d)=>{if(d.levels&&d.levels[0]){let l=d.levels[0];codec=l.audioCodec||"AAC";if(codec.includes("mp4a.40.2"))codec="AAC-LC";else if(codec.includes("mp4a.40.5"))codec="AAC-HE";fmt=l.videoCodec?"A+V":"Áudio";}sts.className="status-indicator";});
   hls.on(Hls.Events.FRAG_LOADED,(e,d)=>{if(d.frag.stats){let bits=d.frag.stats.loaded*8;let dur=d.frag.duration;bitrate=Math.round(bits/1000/dur)+" kbps";}});
   hls.on(Hls.Events.ERROR,(e,d)=>{console.error("HLS Error",d);sts.className="status-indicator error";});
  }else if(m.canPlayType("application/vnd.apple.mpegurl")){m.src=s.url;}
 }else{
  m.src=s.url;
  if(s.url.includes(".aac"))codec="AAC-LC";
  else if(s.url.includes(".mp3"))codec="MP3";
  else if(s.url.includes("dreamsiteradiocp"))codec="MP3";
  else codec="Áudio stream";
  if(s.url.includes("cbn"))bitrate="64 kbps";
  else if(s.url.includes("novabrasil"))bitrate="128 kbps";
  else if(s.url.includes("maria"))bitrate="128 kbps";
 }
 function setup(){
  if(audioOk||!audioCtx||audioCtx.state!="running")return;
  try{if(!src){
   src=audioCtx.createMediaElementSource(m);
   an=audioCtx.createAnalyser();an.fftSize=2048;
   let sp=audioCtx.createChannelSplitter(2);
   anL=audioCtx.createAnalyser();anR=audioCtx.createAnalyser();
   anL.fftSize=256;anR.fftSize=256;
   src.connect(an);src.connect(sp);sp.connect(anL,0);sp.connect(anR,1);
   an.connect(audioCtx.destination);
   audioOk=true;sts.className="status-indicator";
   console.log("Áudio OK",s.name);
  }}catch(e){console.error("Erro",e);sts.className="status-indicator error";}
 }
 m.addEventListener("play",()=>{if(!audioCtx)initAudioContext();if(audioCtx&&audioCtx.state=="running")setup();});
 const buf=new Uint8Array(2048),bufL=new Uint8Array(128),bufR=new Uint8Array(128);
 let vu=-60,peak=-60;
 function draw(){
  requestAnimationFrame(draw);
  if(audioCtx){
   if(audioCtx.state=="running"&&m.paused)sts.className="status-indicator paused";
   else if(audioCtx.state=="running"&&!m.paused)sts.className="status-indicator";
   else if(audioCtx.state=="suspended")sts.className="status-indicator paused";
  }
  if(an&&audioCtx&&audioCtx.state=="running"&&!m.paused){
   try{
    an.getByteTimeDomainData(buf);
    let sum=0,pk=0;for(let i=0;i<buf.length;i++){let v=(buf[i]-128)/128;sum+=v*v;pk=Math.max(pk,Math.abs(v));}
    let rms=Math.sqrt(sum/buf.length);let db=20*Math.log10(rms||1e-5);db=Math.max(-60,Math.min(0,db));
    vu+=(db-vu)*0.15;
    let peakDb=20*Math.log10(pk||1e-5);peakDb=Math.max(-60,Math.min(0,peakDb));
    if(peakDb>peak)peak=peakDb;else peak-=0.5;
    if(pk>0.98)pl.classList.add("on");else pl.classList.remove("on");
    dbfs.textContent=vu.toFixed(1);
    if(vu>-6){dbfs.style.color="#ff5555";dbfs.style.textShadow="0 0 15px #f00";}
    else if(vu>-18){dbfs.style.color="#ffaa00";dbfs.style.textShadow="0 0 10px #ffaa00";}
    else if(vu>-40){dbfs.style.color="#ffff00";dbfs.style.textShadow="0 0 8px #ffff00";}
    else {dbfs.style.color="#33ff33";dbfs.style.textShadow="0 0 5px #33ff33";}
    let ch="Mono",chIcon="🔊";
    if(anL&&anR){
     anL.getByteFrequencyData(bufL);anR.getByteFrequencyData(bufR);
     let sumL=0,sumR=0;for(let i=0;i<bufL.length;i++){sumL+=bufL[i];sumR+=bufR[i];}
     let avgL=sumL/bufL.length,avgR=sumR/bufR.length;
     if(avgL>5&&avgR>5){let diff=Math.abs(avgL-avgR)/((avgL+avgR)/2);ch=diff<0.2?"Estéreo":"Mono";chIcon=ch=="Estéreo"?"🎧":"🔊";}
    }
    drawVU(vu,peak);
    let bufSize=m.buffered.length?(m.buffered.end(0)-m.currentTime).toFixed(1)+"s":"-";
    let extra=s.type=="tv"?`<div class="box"><span>Formato</span><strong>${fmt}</strong></div><div class="box"><span>Container</span><strong>${cont}</strong></div>`:`<div class="box"><span>Bitrate</span><strong>${bitrate||"VBR"}</strong></div><div class="box"><span>Qualidade</span><strong>${codec}</strong></div>`;
    ig.innerHTML=`<div class="box"><span>Codec</span><strong>${codec}</strong></div><div class="box"><span>Canais</span><strong>${chIcon} ${ch}</strong></div><div class="box"><span>Sample Rate</span><strong>${audioCtx.sampleRate} Hz</strong></div><div class="box"><span>Bitrate</span><strong>${bitrate||"--"}</strong></div>${extra}<div class="box"><span>Buffer</span><strong>${bufSize}</strong></div><div class="box"><span>Peak</span><strong>${peak.toFixed(1)} dBFS</strong></div>`;
   }catch(e){console.error("draw",e);drawStatic();}
  }else{drawStatic();ig.innerHTML=`<div class="box"><span>Codec</span><strong>${codec}</strong></div><div class="box"><span>Canais</span><strong>🔊 --</strong></div><div class="box"><span>Sample Rate</span><strong>${audioCtx?audioCtx.sampleRate+" Hz":"--"}</strong></div><div class="box"><span>Bitrate</span><strong>${bitrate||"--"}</strong></div><div class="box"><span>Formato</span><strong>${fmt}</strong></div><div class="box"><span>Container</span><strong>${cont}</strong></div><div class="box"><span>Buffer</span><strong>--</strong></div><div class="box"><span>Peak</span><strong>-60.0 dBFS</strong></div>`;}
 }
 function drawVU(v,p){
  ctx.clearRect(0,0,360,230);const cx=180,cy=190,r=140,n=32,w=16,sp=2,arc=Math.PI;
  for(let i=0;i<n;i++){
   let seg=-60+(i/n)*60,st=Math.PI+(i/n)*arc,en=Math.PI+((i+1)/n)*arc-(sp/r);
   let col;if(seg>-6)col="#f33";else if(seg>-18)col="#fa0";else if(seg>-40)col="#ff0";else col="#3f3";
   let act=v>=seg;ctx.beginPath();ctx.lineWidth=w;ctx.strokeStyle=act?col:"#1a2530";
   if(act){ctx.shadowColor=col;ctx.shadowBlur=8;}
   ctx.arc(cx,cy,r,st,en);ctx.stroke();ctx.shadowBlur=0;
  }
  let ang=Math.PI+((v+60)/60)*arc;
  ctx.beginPath();ctx.arc(cx,cy,20,0,7);ctx.fillStyle="#345";ctx.fill();ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+(r-30)*Math.cos(ang),cy+(r-30)*Math.sin(ang));ctx.strokeStyle="#fff";ctx.lineWidth=3;ctx.shadowColor="#fff";ctx.shadowBlur=10;ctx.stroke();ctx.shadowBlur=0;
  ctx.beginPath();ctx.arc(cx,cy,6,0,7);ctx.fillStyle="#aaa";ctx.fill();ctx.strokeStyle="#666";ctx.lineWidth=1;ctx.stroke();
  if(p>-60){let pang=Math.PI+((p+60)/60)*arc;ctx.beginPath();ctx.arc(cx+(r-15)*Math.cos(pang),cy+(r-15)*Math.sin(pang),5,0,7);ctx.fillStyle="#fff";ctx.shadowColor="#fff";ctx.shadowBlur=10;ctx.fill();ctx.shadowBlur=0;}
  ctx.fillStyle="#9fb3c8";ctx.font="11px Arial";
  for(let i=-60;i<=0;i+=10){let a=Math.PI+((i+60)/60)*Math.PI;let x=cx+(r-55)*Math.cos(a);let y=cy+(r-55)*Math.sin(a);ctx.fillText(i,x-10,y+4);}
 }
 function drawStatic(){drawVU(-60,-60);}
 draw();
 document.getElementById("grid").appendChild(c);
}
window.initAudioContext=function(){let c=new(window.AudioContext||window.webkitAudioContext);c.resume().then(()=>{audioCtx=c;console.log("AudioContext ok");document.querySelectorAll("audio,video").forEach(m=>{if(!m.paused)m.dispatchEvent(new Event("play"));});});};
document.body.addEventListener("click",()=>{if(!audioCtx)initAudioContext();else if(audioCtx.state=="suspended")audioCtx.resume();},{once:true});
</script>
</body></html>
