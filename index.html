*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0f15;font-family:Segoe UI,sans-serif;color:#e6edf3;padding:20px}
h2{text-align:center;color:#ffaa00;text-shadow:0 0 20px #ffaa00;margin:0 0 30px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:25px;max-width:1600px;margin:0 auto}
.card{background:#111c26;border-radius:18px;padding:18px;box-shadow:0 10px 30px #000c;border:1px solid #2a3a4a}
video,audio{width:100%;border-radius:10px;background:#000;margin-top:10px}
canvas{width:100%;height:230px;margin-top:10px;background:#0a141f;border-radius:12px;padding:5px}
.peak-led{width:16px;height:16px;border-radius:50%;background:#330000;margin:8px auto;transition:.1s}
.peak-led.on{background:red;box-shadow:0 0 20px red}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:15px}
.box{background:#162430;padding:8px;border-radius:8px;font-size:11px;border-left:3px solid #ffaa00}
.box span{color:#8a9bb0;display:block;margin-bottom:4px}
.box strong{display:block;font-size:13px;color:#fff}
.dbfs-display{background:#0a141f;border:2px solid #2a3a4a;border-radius:8px;padding:10px;margin:10px 0;text-align:center;box-shadow:inset 0 2px 5px #0008}
.dbfs-value{font-size:32px;font-weight:700;font-family:'Courier New',monospace;color:#ffaa00;text-shadow:0 0 15px #ffaa00}
.dbfs-label{font-size:12px;color:#8a9bb0;margin-left:5px}
.dbfs-scale{display:flex;justify-content:space-between;font-size:10px;color:#5a6b80;margin-top:5px;padding:0 5px}
.stream-header{display:flex;align-items:center;gap:12px;margin-bottom:15px;background:#0a141f;padding:12px;border-radius:12px}
.stream-icon{width:40px;height:40px;border-radius:8px;background:#1e2a36;display:flex;align-items:center;justify-content:center;font-size:20px}
.stream-title{flex:1}
.stream-title h3{margin:0;font-size:16px;display:flex;align-items:center;gap:8px}
.stream-title small{color:#ffaa00;font-size:10px;display:block;margin-top:4px}
.stream-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:9px;font-weight:700}
.badge-tv{background:#4a6a8a;color:#fff}
.badge-radio{background:#8a6a4a;color:#fff}
.status-indicator{width:10px;height:10px;border-radius:50%;background:#4caf50;animation:pulse 2s infinite}
.status-indicator.paused{background:#ffaa00}
.status-indicator.error{background:#f44336}
@keyframes pulse{0%{opacity:1}50%{opacity:.5}100%{opacity:1}}
.control-bar{display:flex;gap:10px;margin:10px 0;justify-content:center}
.control-btn{background:#1e2a36;border:1px solid #3a4a5a;color:#fff;padding:5px 15px;border-radius:20px;font-size:12px;cursor:pointer}
.control-btn:hover{background:#2a3a4a;border-color:#ffaa00}
.footer{margin-top:40px;padding:20px;text-align:center;border-top:1px solid #2a3a4a;color:#5a6b80;font-size:12px}
.footer a{color:#ffaa00;text-decoration:none;margin:0 10px}
.footer a:hover{text-decoration:underline}
</style></head>
<body>
<h2>🎵 Painel Broadcast - VU Meter LED</h2>
<div class="grid" id="grid"></div>
<div class="footer"><p>Painel Broadcast - VU Meter LED | Streams ao vivo</p><p><a href="#" onclick="return false;">Termos de Uso</a> | <a href="#" onclick="return false;">Privacidade</a> | <span>v2.0.0</span></p></div>
<script>
const streams=[
{name:"TV O Povo",url:"https://v-us-01.wisestream.io/memfs/e8740862-7a1f-45f3-acb2-4f357e144059.m3u8",type:"tv",icon:"📺"},
{name:"TV FDR",url:"https://v-us-01.wisestream.io/memfs/e4ade538-7924-4359-81ef-b9d4dd229e91.m3u8",type:"tv",icon:"📡"},
{name:"CBN Cariri",url:"https://ice-br.fabricahost.com.br/play/cbncariri",type:"radio",icon:"🔊"},
{name:"CBN Fortaleza",url:"https://ice-br.fabricahost.com.br/play/cbnfortaleza",type:"radio",icon:"🎙️"},
{name:"Nova Brasil",url:"https://playerservices.streamtheworld.com/api/livestream-redirect/NOVABRASIL_FORAAC.aac",type:"radio",icon:"🎵"},
{name:"Rádio Maria FM",url:"https://dreamsiteradiocp6.com/proxy/rmbrasile?mp=/stream",type:"radio",icon:"🙏"}
];

let audioCtx = null;

function initAudioContext() {
  if (!audioCtx) {
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioContextClass();
  }
  return audioCtx.resume();
}

// Função para configurar análise de áudio em um card específico
function setupAudioForMedia(media, statusIndicator, streamName) {
  if (!audioCtx || audioCtx.state !== 'running') return false;
  // Procura o card que contém este media
  const card = media.closest('.card');
  if (!card) return false;
  // Tenta obter as variáveis do card (elas foram definidas no escopo da função createCard)
  // Como não temos acesso direto, vamos usar um mapa fraco ou armazenar nos atributos do card.
  // Melhor: vamos armazenar a função de setup no próprio card.
  // Vamos modificar a criação do card para guardar uma referência.
  // Mas para simplificar, vamos recriar a lógica de setup baseada nos atributos do card.
  // Isso é mais complexo. Vamos mudar a abordagem: ao criar o card, armazenamos as variáveis em um objeto no card.
  // Como o código já está grande, farei uma versão simplificada: cada card terá um método setup.
  // Precisamos reestruturar.
  
  // Por enquanto, vou deixar a lógica original e adicionar uma chamada global após o clique.
  // A função original setupAudioAnalysis está dentro de createCard, e é chamada no evento play.
  // Para ativar manualmente, podemos disparar o evento 'play' novamente.
  // Isso não é ideal, mas pode funcionar.
  
  // Alternativa: armazenar a função setup no próprio elemento media.
  // Vamos adicionar um atributo data-setup com a função? Não dá.
  
  // Melhor solução: refatorar createCard para expor uma função de setup.
}

// Vamos refatorar createCard para guardar a função setup no próprio card.
// Para isso, vamos modificar a criação.

const cards = []; // não usado

function createCard(stream) {
  const card = document.createElement("div");
  card.className = "card";
  
  const badgeClass = stream.type === "tv" ? "badge-tv" : "badge-radio";
  const badgeText = stream.type === "tv" ? "📺 TV" : "📻 RÁDIO";

  card.innerHTML = `
    <div class="stream-header">
      <div class="stream-icon">${stream.icon}</div>
      <div class="stream-title">
        <h3>${stream.name} <span class="stream-badge ${badgeClass}">${badgeText}</span></h3>
        <small>${stream.url.split('/')[2]}</small>
      </div>
      <div class="status-indicator paused" id="status-${stream.name.replace(/\s/g, '')}"></div>
    </div>
    ${stream.type === "tv" ? "<video controls crossorigin='anonymous' preload='none'></video>" : "<audio controls crossorigin='anonymous' preload='none'></audio>"}
    <div class="control-bar">
      <button class="control-btn" onclick="initAudioContext()">🔊 Iniciar Áudio</button>
    </div>
    <div class="dbfs-display">
      <span class="dbfs-value" id="dbfs-${stream.name.replace(/\s/g, '')}">-60.0</span>
      <span class="dbfs-label">dBFS</span>
      <div class="dbfs-scale">
        <span>-60</span>
        <span>-40</span>
        <span>-20</span>
        <span>0</span>
      </div>
    </div>
    <canvas></canvas>
    <div class="peak-led"></div>
    <div class="info-grid"></div>
  `;

  const media = card.querySelector("video") || card.querySelector("audio");
  const canvas = card.querySelector("canvas");
  const ctx = canvas.getContext("2d");
  const peakLed = card.querySelector(".peak-led");
  const infoGrid = card.querySelector(".info-grid");
  const dbfsElement = document.getElementById(`dbfs-${stream.name.replace(/\s/g, '')}`);
  const statusIndicator = document.getElementById(`status-${stream.name.replace(/\s/g, '')}`);

  canvas.width = 360;
  canvas.height = 230;

  let codec = "-";
  let bitrate = "-";
  let streamFormat = "-";
  let containerFormat = stream.url.endsWith(".m3u8") ? "HLS" : "Direto";
  let source = null;
  let analyser = null;
  let analyserL = null;
  let analyserR = null;
  let audioSetupDone = false;

  // Configura HLS
  if (stream.url.endsWith(".m3u8")) {
    if (Hls.isSupported()) {
      const hls = new Hls({ enableWorker: true, lowLatencyMode: true, backBufferLength: 90 });
      hls.loadSource(stream.url);
      hls.attachMedia(media);
      hls.on(Hls.Events.MANIFEST_PARSED, (e, data) => {
        if (data.levels && data.levels[0]) {
          const level = data.levels[0];
          codec = level.audioCodec || "AAC";
          if (codec.includes("mp4a.40.2")) codec = "AAC-LC";
          else if (codec.includes("mp4a.40.5")) codec = "AAC-HE";
          streamFormat = level.videoCodec ? "A+V" : "Áudio";
        }
        statusIndicator.className = "status-indicator";
      });
      hls.on(Hls.Events.FRAG_LOADED, (e, data) => {
        if (data.frag.stats) {
          const bitsLoaded = data.frag.stats.loaded * 8;
          const duration = data.frag.duration;
          bitrate = Math.round(bitsLoaded / 1000 / duration) + " kbps";
        }
      });
      hls.on(Hls.Events.ERROR, (e, data) => {
        console.error("HLS Error:", data);
        statusIndicator.className = "status-indicator error";
      });
    } else if (media.canPlayType('application/vnd.apple.mpegurl')) {
      media.src = stream.url;
    }
  } else {
    media.src = stream.url;
    if (stream.url.includes(".aac")) codec = "AAC-LC";
    else if (stream.url.includes(".mp3")) codec = "MP3";
    else if (stream.url.includes("dreamsiteradiocp")) codec = "MP3";
    else codec = "Áudio stream";
    if (stream.url.includes("cbn")) bitrate = "64 kbps";
    else if (stream.url.includes("novabrasil")) bitrate = "128 kbps";
    else if (stream.url.includes("maria")) bitrate = "128 kbps";
  }

  // Função de configuração de áudio
  function setupAudioAnalysis() {
    if (audioSetupDone || !audioCtx || audioCtx.state !== 'running') return false;
    try {
      if (!source) {
        source = audioCtx.createMediaElementSource(media);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        const splitter = audioCtx.createChannelSplitter(2);
        analyserL = audioCtx.createAnalyser();
        analyserR = audioCtx.createAnalyser();
        analyserL.fftSize = 256;
        analyserR.fftSize = 256;
        source.connect(analyser);
        source.connect(splitter);
        splitter.connect(analyserL, 0);
        splitter.connect(analyserR, 1);
        analyser.connect(audioCtx.destination);
        audioSetupDone = true;
        statusIndicator.className = "status-indicator";
        console.log("Áudio configurado para:", stream.name);
        return true;
      }
    } catch (e) {
      console.error("Erro ao configurar áudio:", e);
      statusIndicator.className = "status-indicator error";
    }
    return false;
  }

  // Tenta configurar quando o áudio começar
  media.addEventListener('play', () => {
    if (!audioCtx) {
      initAudioContext().then(() => {
        setupAudioAnalysis();
      });
    } else if (audioCtx.state === 'running') {
      setupAudioAnalysis();
    } else if (audioCtx.state === 'suspended') {
      audioCtx.resume().then(() => {
        setupAudioAnalysis();
      });
    }
  });

  // Função para ativar manualmente (chamada após o clique)
  function activate() {
    if (!media.paused) {
      if (!audioCtx) {
        initAudioContext().then(() => setupAudioAnalysis());
      } else if (audioCtx.state === 'running') {
        setupAudioAnalysis();
      } else if (audioCtx.state === 'suspended') {
        audioCtx.resume().then(() => setupAudioAnalysis());
      }
    }
  }

  // Armazenar a função activate no próprio card para uso posterior
  card.activateAudio = activate;

  // Animação
  const buffer = new Uint8Array(2048);
  const bufferL = new Uint8Array(128);
  const bufferR = new Uint8Array(128);
  let vuValue = -60;
  let peakHold = -60;

  function draw() {
    requestAnimationFrame(draw);

    if (audioCtx) {
      if (audioCtx.state === 'running' && media.paused) {
        statusIndicator.className = "status-indicator paused";
      } else if (audioCtx.state === 'running' && !media.paused) {
        statusIndicator.className = "status-indicator";
      } else if (audioCtx.state === 'suspended') {
        statusIndicator.className = "status-indicator paused";
      }
    }

    if (analyser && audioCtx && audioCtx.state === 'running' && !media.paused) {
      try {
        analyser.getByteTimeDomainData(buffer);

        let sum = 0, peak = 0;
        for (let i = 0; i < buffer.length; i++) {
          let v = (buffer[i] - 128) / 128;
          sum += v * v;
          peak = Math.max(peak, Math.abs(v));
        }

        let rms = Math.sqrt(sum / buffer.length);
        let db = 20 * Math.log10(rms || 1e-5);
        db = Math.max(-60, Math.min(0, db));

        vuValue += (db - vuValue) * 0.15;

        let peakDb = 20 * Math.log10(peak || 1e-5);
        peakDb = Math.max(-60, Math.min(0, peakDb));

        if (peakDb > peakHold) peakHold = peakDb;
        else peakHold -= 0.5;

        if (peak > 0.98) peakLed.classList.add("on");
        else peakLed.classList.remove("on");

        dbfsElement.textContent = vuValue.toFixed(1);

        if (vuValue > -6) {
          dbfsElement.style.color = '#ff5555';
          dbfsElement.style.textShadow = '0 0 15px #f00';
        } else if (vuValue > -18) {
          dbfsElement.style.color = '#ffaa00';
          dbfsElement.style.textShadow = '0 0 10px #ffaa00';
        } else if (vuValue > -40) {
          dbfsElement.style.color = '#ffff00';
          dbfsElement.style.textShadow = '0 0 8px #ffff00';
        } else {
          dbfsElement.style.color = '#33ff33';
          dbfsElement.style.textShadow = '0 0 5px #33ff33';
        }

        // Detectar mono/estéreo
        let channelInfo = "Mono", channelIcon = "🔊";
        if (analyserL && analyserR) {
          analyserL.getByteFrequencyData(bufferL);
          analyserR.getByteFrequencyData(bufferR);
          let sumL = 0, sumR = 0;
          for (let i = 0; i < bufferL.length; i++) {
            sumL += bufferL[i];
            sumR += bufferR[i];
          }
          let avgL = sumL / bufferL.length;
          let avgR = sumR / bufferR.length;
          if (avgL > 5 && avgR > 5) {
            let diff = Math.abs(avgL - avgR) / ((avgL + avgR) / 2);
            channelInfo = diff < 0.2 ? "Estéreo" : "Mono";
            channelIcon = channelInfo === "Estéreo" ? "🎧" : "🔊";
          }
        }

        drawVUMeter(vuValue, peakHold);

        const bufferSize = media.buffered.length ? (media.buffered.end(0) - media.currentTime).toFixed(1) + "s" : "-";
        const extra = stream.type === "tv" ?
          `<div class="box"><span>Formato</span><strong>${streamFormat}</strong></div><div class="box"><span>Container</span><strong>${containerFormat}</strong></div>` :
          `<div class="box"><span>Bitrate</span><strong>${bitrate || "VBR"}</strong></div><div class="box"><span>Qualidade</span><strong>${codec}</strong></div>`;

        infoGrid.innerHTML = `
          <div class="box"><span>Codec</span><strong>${codec}</strong></div>
          <div class="box"><span>Canais</span><strong>${channelIcon} ${channelInfo}</strong></div>
          <div class="box"><span>Sample Rate</span><strong>${audioCtx.sampleRate} Hz</strong></div>
          <div class="box"><span>Bitrate</span><strong>${bitrate || "--"}</strong></div>
          ${extra}
          <div class="box"><span>Buffer</span><strong>${bufferSize}</strong></div>
          <div class="box"><span>Peak</span><strong>${peakHold.toFixed(1)} dBFS</strong></div>
        `;
      } catch (e) {
        console.error("Erro no processamento:", e);
        drawStaticVU();
      }
    } else {
      drawStaticVU();
      infoGrid.innerHTML = `
        <div class="box"><span>Codec</span><strong>${codec}</strong></div>
        <div class="box"><span>Canais</span><strong>🔊 --</strong></div>
        <div class="box"><span>Sample Rate</span><strong>${audioCtx ? audioCtx.sampleRate + " Hz" : "--"}</strong></div>
        <div class="box"><span>Bitrate</span><strong>${bitrate || "--"}</strong></div>
        <div class="box"><span>Formato</span><strong>${streamFormat}</strong></div>
        <div class="box"><span>Container</span><strong>${containerFormat}</strong></div>
        <div class="box"><span>Buffer</span><strong>--</strong></div>
        <div class="box"><span>Peak</span><strong>-60.0 dBFS</strong></div>
      `;
    }
  }

  function drawVUMeter(value, peak) {
    ctx.clearRect(0, 0, 360, 230);
    const cx = 180, cy = 190, r = 140, n = 32, w = 16, sp = 2, arc = Math.PI;
    for (let i = 0; i < n; i++) {
      let seg = -60 + (i / n) * 60;
      let st = Math.PI + (i / n) * arc;
      let en = Math.PI + ((i + 1) / n) * arc - (sp / r);
      let col = seg > -6 ? "#f33" : seg > -18 ? "#fa0" : seg > -40 ? "#ff0" : "#3f3";
      let act = value >= seg;
      ctx.beginPath();
      ctx.lineWidth = w;
      ctx.strokeStyle = act ? col : "#1a2530";
      if (act) { ctx.shadowColor = col; ctx.shadowBlur = 8; }
      ctx.arc(cx, cy, r, st, en);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
    let ang = Math.PI + ((value + 60) / 60) * arc;
    ctx.beginPath();
    ctx.arc(cx, cy, 20, 0, 2 * Math.PI);
    ctx.fillStyle = "#334455";
    ctx.fill();
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + (r - 30) * Math.cos(ang), cy + (r - 30) * Math.sin(ang));
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 3;
    ctx.shadowColor = "#fff";
    ctx.shadowBlur = 10;
    ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.beginPath();
    ctx.arc(cx, cy, 6, 0, 2 * Math.PI);
    ctx.fillStyle = "#aaa";
    ctx.fill();
    ctx.strokeStyle = "#666";
    ctx.lineWidth = 1;
    ctx.stroke();

    if (peak > -60) {
      let pang = Math.PI + ((peak + 60) / 60) * arc;
      ctx.beginPath();
      ctx.arc(cx + (r - 15) * Math.cos(pang), cy + (r - 15) * Math.sin(pang), 5, 0, 2 * Math.PI);
      ctx.fillStyle = "#fff";
      ctx.shadowColor = "#fff";
      ctx.shadowBlur = 10;
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    ctx.fillStyle = "#9fb3c8";
    ctx.font = "11px Arial";
    for (let i = -60; i <= 0; i += 10) {
      let a = Math.PI + ((i + 60) / 60) * Math.PI;
      let x = cx + (r - 55) * Math.cos(a);
      let y = cy + (r - 55) * Math.sin(a);
      ctx.fillText(i, x - 10, y + 4);
    }
  }

  function drawStaticVU() {
    drawVUMeter(-60, -60);
  }

  draw();
  document.getElementById("grid").appendChild(card);
  return card;
}

streams.forEach(stream => createCard(stream));

// Função global para iniciar áudio e ativar todos os players em execução
window.initAudioContext = function() {
  if (!audioCtx) {
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioContextClass();
  }
  audioCtx.resume().then(() => {
    console.log("AudioContext ativado");
    // Percorre todos os cards e ativa o áudio se o media estiver tocando
    document.querySelectorAll('.card').forEach(card => {
      const media = card.querySelector('video, audio');
      if (media && !media.paused && card.activateAudio) {
        card.activateAudio();
      }
    });
  });
};

// Clique em qualquer lugar da página ativa o contexto (uma vez)
document.body.addEventListener('click', () => {
  if (!audioCtx) {
    initAudioContext();
  } else if (audioCtx.state === 'suspended') {
    audioCtx.resume().then(() => {
      document.querySelectorAll('.card').forEach(card => {
        const media = card.querySelector('video, audio');
        if (media && !media.paused && card.activateAudio) {
          card.activateAudio();
        }
      });
    });
  }
}, { once: true });
</script>
