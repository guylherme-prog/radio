<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Broadcast - VU Meter LED</title>
<!-- HLS.js via CDN -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #0a0f15;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #e6edf3;
    padding: 20px;
}

h2 {
    text-align: center;
    color: #ffaa00;
    text-shadow: 0 0 20px #ffaa00;
    margin-bottom: 30px;
    font-size: 28px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    gap: 25px;
    max-width: 1600px;
    margin: 0 auto;
}

.card {
    background: #111c26;
    border-radius: 18px;
    padding: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    border: 1px solid #2a3a4a;
}

video, audio {
    width: 100%;
    border-radius: 10px;
    background: #000;
    margin-top: 10px;
}

canvas {
    width: 100%;
    height: 230px;
    margin-top: 10px;
    background: #0a141f;
    border-radius: 12px;
    padding: 5px;
}

.peak-led {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #330000;
    margin: 8px auto;
    transition: all 0.1s ease;
}

.peak-led.on {
    background: #ff0000;
    box-shadow: 0 0 20px #ff0000;
}

.info-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-top: 15px;
}

.box {
    background: #162430;
    padding: 8px;
    border-radius: 8px;
    font-size: 11px;
    border-left: 3px solid #ffaa00;
}

.box span {
    color: #8a9bb0;
    display: block;
    margin-bottom: 4px;
}

.box strong {
    display: block;
    font-size: 13px;
    color: #ffffff;
}

/* Display dBFS */
.dbfs-display {
    background: #0a141f;
    border: 2px solid #2a3a4a;
    border-radius: 8px;
    padding: 10px;
    margin: 10px 0;
    text-align: center;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
}

.dbfs-value {
    font-size: 32px;
    font-weight: bold;
    font-family: 'Courier New', monospace;
    color: #ffaa00;
    text-shadow: 0 0 15px #ffaa00;
}

.dbfs-label {
    font-size: 12px;
    color: #8a9bb0;
    margin-left: 5px;
}

.dbfs-scale {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #5a6b80;
    margin-top: 5px;
    padding: 0 5px;
}

/* Header com status */
.stream-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 15px;
    background: #0a141f;
    padding: 12px;
    border-radius: 12px;
}

.stream-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    background: #1e2a36;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
}

.stream-title {
    flex: 1;
}

.stream-title h3 {
    margin: 0;
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.stream-title small {
    color: #ffaa00;
    font-size: 10px;
    display: block;
    margin-top: 4px;
}

.stream-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 9px;
    font-weight: bold;
}

.badge-tv {
    background: #4a6a8a;
    color: white;
}

.badge-radio {
    background: #8a6a4a;
    color: white;
}

.status-indicator {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #ffaa00;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.5; }
    100% { opacity: 1; }
}

.error-message {
    color: #ff5555;
    font-size: 12px;
    padding: 10px;
    text-align: center;
    background: #2a1a1a;
    border-radius: 8px;
    margin: 10px 0;
}
</style>
</head>
<body>

<h2>🎵 Painel Broadcast - VU Meter LED</h2>
<div class="grid" id="grid"></div>

<script>
// Configuração dos streams
const streams = [
    { 
        name: "TV O Povo", 
        url: "https://v-us-01.wisestream.io/memfs/e8740862-7a1f-45f3-acb2-4f357e144059.m3u8", 
        type: "tv",
        icon: "📺"
    },
    { 
        name: "TV FDR", 
        url: "https://v-us-01.wisestream.io/memfs/e4ade538-7924-4359-81ef-b9d4dd229e91.m3u8", 
        type: "tv",
        icon: "📡"
    },
    { 
        name: "CBN Cariri", 
        url: "https://ice-br.fabricahost.com.br/play/cbncariri", 
        type: "radio",
        icon: "🔊"
    },
    { 
        name: "CBN Fortaleza", 
        url: "https://ice-br.fabricahost.com.br/play/cbnfortaleza", 
        type: "radio",
        icon: "🎙️"
    },
    { 
        name: "Nova Brasil", 
        url: "https://playerservices.streamtheworld.com/api/livestream-redirect/NOVABRASIL_FORAAC.aac", 
        type: "radio",
        icon: "🎵"
    },
    { 
        name: "Rádio Maria FM", 
        url: "https://dreamsiteradiocp6.com/proxy/rmbrasile?mp=/stream", 
        type: "radio",
        icon: "🙏"
    }
];

// Inicializa AudioContext
const AudioContext = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioContext();

// Resume AudioContext no clique
document.body.addEventListener("click", () => {
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}, { once: true });

// Cria os cards
streams.forEach(createCard);

function createCard(stream) {
    const card = document.createElement("div");
    card.className = "card";
    
    const badgeClass = stream.type === "tv" ? "badge-tv" : "badge-radio";
    const badgeText = stream.type === "tv" ? "📺 TV" : "📻 RÁDIO";

    card.innerHTML = `
    <div class="stream-header">
        <div class="stream-icon">${stream.icon}</div>
        <div class="stream-title">
            <h3>${stream.name} <span class="stream-badge ${badgeClass}">${badgeText}</span></h3>
            <small>${stream.url.split('/')[2]}</small>
        </div>
        <div class="status-indicator"></div>
    </div>
    ${stream.type === "tv" ? "<video controls crossorigin='anonymous' preload='none'></video>" : "<audio controls crossorigin='anonymous' preload='none'></audio>"}
    <div class="dbfs-display">
        <span class="dbfs-value" id="dbfs-${stream.name.replace(/\s/g, '')}">-60.0</span>
        <span class="dbfs-label">dBFS</span>
        <div class="dbfs-scale">
            <span>-60</span>
            <span>-40</span>
            <span>-20</span>
            <span>0</span>
        </div>
    </div>
    <canvas></canvas>
    <div class="peak-led"></div>
    <div class="info-grid"></div>
    `;

    const media = card.querySelector("video") || card.querySelector("audio");
    const canvas = card.querySelector("canvas");
    const ctx = canvas.getContext("2d");
    const peakLed = card.querySelector(".peak-led");
    const infoGrid = card.querySelector(".info-grid");
    const dbfsElement = card.querySelector(`#dbfs-${stream.name.replace(/\s/g, '')}`);

    canvas.width = 360;
    canvas.height = 230;

    let codec = "-";
    let bitrate = "-";
    let streamFormat = "-";
    let containerFormat = stream.url.endsWith(".m3u8") ? "HLS" : "Direto";
    let errorCount = 0;

    // Configura HLS para streams .m3u8
    if (stream.url.endsWith(".m3u8")) {
        if (Hls.isSupported()) {
            const hls = new Hls({
                enableWorker: true,
                lowLatencyMode: true,
                backBufferLength: 90
            });
            
            hls.loadSource(stream.url);
            hls.attachMedia(media);
            
            hls.on(Hls.Events.MANIFEST_PARSED, (e, data) => {
                if (data.levels && data.levels.length > 0) {
                    const level = data.levels[0];
                    codec = level.audioCodec || "AAC";
                    if (codec.includes("mp4a.40.2")) codec = "AAC-LC";
                    else if (codec.includes("mp4a.40.5")) codec = "AAC-HE";
                    streamFormat = level.videoCodec ? "A+V" : "Áudio";
                }
                media.play().catch(e => console.log("Playback error:", e));
            });
            
            hls.on(Hls.Events.FRAG_LOADED, (e, data) => {
                if (data.frag.stats) {
                    const bitsLoaded = data.frag.stats.loaded * 8;
                    const duration = data.frag.duration;
                    bitrate = Math.round(bitsLoaded / 1000 / duration) + " kbps";
                }
            });

            hls.on(Hls.Events.ERROR, (e, data) => {
                console.error("HLS Error:", data);
                errorCount++;
            });
        } else if (media.canPlayType('application/vnd.apple.mpegurl')) {
            media.src = stream.url;
        }
    } else {
        media.src = stream.url;
        if (stream.url.includes(".aac")) codec = "AAC-LC";
        else if (stream.url.includes(".mp3")) codec = "MP3";
        else codec = "Áudio stream";
    }

    // Configuração do áudio
    let source, analyser, analyserL, analyserR;
    
    media.addEventListener('play', () => {
        if (!source && audioCtx.state === 'running') {
            try {
                source = audioCtx.createMediaElementSource(media);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                
                // Para detecção estéreo
                const splitter = audioCtx.createChannelSplitter(2);
                analyserL = audioCtx.createAnalyser();
                analyserR = audioCtx.createAnalyser();
                analyserL.fftSize = 256;
                analyserR.fftSize = 256;
                
                source.connect(analyser);
                source.connect(splitter);
                splitter.connect(analyserL, 0);
                splitter.connect(analyserR, 1);
                analyser.connect(audioCtx.destination);
                
            } catch (e) {
                console.error("AudioContext error:", e);
            }
        }
    });

    const buffer = new Uint8Array(2048);
    const bufferL = new Uint8Array(128);
    const bufferR = new Uint8Array(128);
    
    let vuValue = -60;
    let peakHold = -60;

    function draw() {
        requestAnimationFrame(draw);

        if (!analyser || !source) {
            // Desenho estático enquanto não há áudio
            drawStaticVU();
            return;
        }

        try {
            analyser.getByteTimeDomainData(buffer);

            let sum = 0;
            let peak = 0;

            for (let i = 0; i < buffer.length; i++) {
                let v = (buffer[i] - 128) / 128;
                sum += v * v;
                peak = Math.max(peak, Math.abs(v));
            }

            let rms = Math.sqrt(sum / buffer.length);
            let db = 20 * Math.log10(rms || 0.00001);
            db = Math.max(-60, Math.min(0, db));

            vuValue += (db - vuValue) * 0.15;

            let peakDb = 20 * Math.log10(peak || 0.00001);
            peakDb = Math.max(-60, Math.min(0, peakDb));

            if (peakDb > peakHold) {
                peakHold = peakDb;
            } else {
                peakHold -= 0.5;
            }

            if (peak > 0.98) peakLed.classList.add("on");
            else peakLed.classList.remove("on");

            dbfsElement.textContent = vuValue.toFixed(1);
            
            // Cor do display
            if (vuValue > -6) {
                dbfsElement.style.color = '#ff5555';
                dbfsElement.style.textShadow = '0 0 15px #ff0000';
            } else if (vuValue > -18) {
                dbfsElement.style.color = '#ffaa00';
                dbfsElement.style.textShadow = '0 0 10px #ffaa00';
            } else if (vuValue > -40) {
                dbfsElement.style.color = '#ffff00';
                dbfsElement.style.textShadow = '0 0 8px #ffff00';
            } else {
                dbfsElement.style.color = '#33ff33';
                dbfsElement.style.textShadow = '0 0 5px #33ff33';
            }

            // Detectar mono/estéreo
            let channelInfo = "Mono";
            let channelIcon = "🔊";
            
            if (analyserL && analyserR) {
                analyserL.getByteFrequencyData(bufferL);
                analyserR.getByteFrequencyData(bufferR);
                
                let sumL = 0, sumR = 0;
                for (let i = 0; i < bufferL.length; i++) {
                    sumL += bufferL[i];
                    sumR += bufferR[i];
                }
                
                let avgL = sumL / bufferL.length;
                let avgR = sumR / bufferR.length;
                let diff = Math.abs(avgL - avgR) / ((avgL + avgR) / 2);
                
                channelInfo = (diff < 0.1 || avgL < 5 || avgR < 5) ? "Mono" : "Estéreo";
                channelIcon = channelInfo === "Estéreo" ? "🎧" : "🔊";
            }

            // Desenha o VU meter
            drawVUMeter(vuValue, peakHold);

            // Informações técnicas
            const bufferSize = media.buffered.length ?
                (media.buffered.end(0) - media.currentTime).toFixed(1) + "s" : "-";

            let typeSpecificInfo = stream.type === "tv" ? 
                `<div class="box"><span>Formato</span><strong>${streamFormat}</strong></div>` :
                `<div class="box"><span>Bitrate</span><strong>${bitrate || 'VBR'}</strong></div>`;

            infoGrid.innerHTML = `
            <div class="box"><span>Codec</span><strong>${codec}</strong></div>
            <div class="box"><span>Canais</span><strong>${channelIcon} ${channelInfo}</strong></div>
            <div class="box"><span>Sample Rate</span><strong>${audioCtx.sampleRate} Hz</strong></div>
            <div class="box"><span>Bitrate</span><strong>${bitrate || '--'}</strong></div>
            ${typeSpecificInfo}
            <div class="box"><span>Buffer</span><strong>${bufferSize}</strong></div>
            <div class="box"><span>Peak</span><strong>${peakDb.toFixed(1)} dBFS</strong></div>
            `;

        } catch (e) {
            console.error("Draw error:", e);
            drawStaticVU();
        }
    }

    function drawVUMeter(value, peak) {
        ctx.clearRect(0, 0, 360, 230);

        const cx = 180;
        const cy = 190;
        const radius = 140;
        const numLeds = 32;
        const ledWidth = 16;
        const spacing = 2;
        const totalArc = Math.PI;

        // Desenha LEDs
        for (let i = 0; i < numLeds; i++) {
            let segDb = -60 + (i / numLeds) * 60;
            let startAngle = Math.PI + (i / numLeds) * totalArc;
            let endAngle = Math.PI + ((i + 1) / numLeds) * totalArc - (spacing / radius);

            let ledColor;
            if (segDb > -6) ledColor = "#ff3333";
            else if (segDb > -18) ledColor = "#ffaa00";
            else if (segDb > -40) ledColor = "#ffff00";
            else ledColor = "#33ff33";

            let isActive = value >= segDb;

            ctx.beginPath();
            ctx.lineWidth = ledWidth;
            ctx.strokeStyle = isActive ? ledColor : "#1a2530";
            
            if (isActive) {
                ctx.shadowColor = ledColor;
                ctx.shadowBlur = 8;
            }

            ctx.arc(cx, cy, radius, startAngle, endAngle);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // Ponteiro
        let pointerAngle = Math.PI + ((value + 60) / 60) * totalArc;

        ctx.beginPath();
        ctx.arc(cx, cy, 20, 0, 2 * Math.PI);
        ctx.fillStyle = "#334455";
        ctx.fill();
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + (radius - 30) * Math.cos(pointerAngle), 
                   cy + (radius - 30) * Math.sin(pointerAngle));
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 3;
        ctx.shadowColor = "#ffffff";
        ctx.shadowBlur = 10;
        ctx.stroke();

        ctx.shadowBlur = 0;

        // Peak
        let peakAngle = Math.PI + ((peak + 60) / 60) * totalArc;
        ctx.beginPath();
        ctx.arc(cx + (radius - 15) * Math.cos(peakAngle),
                cy + (radius - 15) * Math.sin(peakAngle),
                5, 0, 2 * Math.PI);
        ctx.fillStyle = "#ffffff";
        ctx.shadowColor = "#ffffff";
        ctx.shadowBlur = 10;
        ctx.fill();
        ctx.shadowBlur = 0;

        // Escala
        ctx.fillStyle = "#9fb3c8";
        ctx.font = "11px Arial";
        for (let i = -60; i <= 0; i += 10) {
            let angle = Math.PI + ((i + 60) / 60) * Math.PI;
            let x = cx + (radius - 55) * Math.cos(angle);
            let y = cy + (radius - 55) * Math.sin(angle);
            ctx.fillText(i, x - 10, y + 4);
        }
    }

    function drawStaticVU() {
        drawVUMeter(-60, -60);
    }

    draw();
    document.getElementById("grid").appendChild(card);
}

// Fallback para CORS
const originalFetch = window.fetch;
window.fetch = function(url, options) {
    if (url.includes('.m3u8') || url.includes('.aac') || url.includes('.mp3')) {
        return originalFetch(url, { ...options, mode: 'cors', credentials: 'omit' });
    }
    return originalFetch(url, options);
};
</script>
</body>
</html>
